services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        OPENAI_API_KEY: ${OPENAI_API_KEY}
        SMTP_HOST: ${SMTP_HOST}
        SMTP_PORT: ${SMTP_PORT}
        SMTP_USER: ${SMTP_USER}
        SMTP_PASS: ${SMTP_PASS}
        SMTP_FROM: ${SMTP_FROM}
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
      - DATABASE_URL_FILE=/run/secrets/db-url.txt
      - OPENAI_API_KEY_FILE=/run/secrets/openai-api-key.txt
      - OPENAI_CHAT_MODEL=gpt-4o-mini
      - OPENAI_TRANSCRIBE_MODEL=gpt-4o-mini-transcribe
      # SMTP email — all sensitive values read from secrets/
      - SMTP_HOST_FILE=/run/secrets/smtp-host.txt
      - SMTP_PORT=587
      - SMTP_USER_FILE=/run/secrets/smtp-email.txt
      - SMTP_FROM_FILE=/run/secrets/smtp-from.txt
      - SMTP_PASS_FILE=/run/secrets/smtp-password.txt
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER_FILE=/run/secrets/db-username.txt
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password.txt
      - POSTGRES_DB_FILE=/run/secrets/db-name.txt
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db-username.txt)" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

volumes:
  pgdata:
