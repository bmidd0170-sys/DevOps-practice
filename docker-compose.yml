services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL_FILE=/run/secrets/db-url.txt
    volumes:
      - ./secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=/run/secrets/db-username.txt
      - POSTGRES_PASSWORD=/run/secrets/db-password.txt
      - POSTGRES_DB=/run/secrets/db-name.txt
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$(cat /run/secrets/db-username.txt)" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

volumes:
  pgdata:
