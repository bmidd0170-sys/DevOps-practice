name: CI-CD Docker Deploy

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/day10-docker-lab

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: /secrets/db-username.txt
          POSTGRES_PASSWORD: /secrets/db-password.txt
          POSTGRES_DB: /secrets/db-name.txt
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: /secrets/db-url.txt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm i

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      - name: Check Database Health
        run: |
          echo "Checking database connection..."
          npx prisma db execute --stdin <<< "SELECT 1 as health_check;" || exit 1
          echo "Database is healthy"

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load app secrets from files
        shell: bash
        run: |
          {
            echo "DATABASE_URL<<EOF"
            cat secrets/db-url.txt
            echo "EOF"
            echo "OPENAI_API_KEY<<EOF"
            cat secrets/openai-api-key.txt
            echo "EOF"
            echo "SMTP_HOST<<EOF"
            cat secrets/smtp-host.txt
            echo "EOF"
            echo "SMTP_PORT=587"
            echo "SMTP_USER<<EOF"
            cat secrets/smtp-email.txt
            echo "EOF"
            echo "SMTP_PASS<<EOF"
            cat secrets/smtp-password.txt
            echo "EOF"
            echo "SMTP_FROM=NoteAI <bmidd0170@launchpadphilly.org>"
          } >> "$GITHUB_ENV"

      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          SMTP_HOST: ${{ env.SMTP_HOST }}
          SMTP_PORT: ${{ env.SMTP_PORT }}
          SMTP_USER: ${{ env.SMTP_USER }}
          SMTP_PASS: ${{ env.SMTP_PASS }}
          SMTP_FROM: ${{ env.SMTP_FROM }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: IMAGE_NAME,IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DATABASE_URL,OPENAI_API_KEY,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM
          script: |
            set -e

            IMAGE="$IMAGE_NAME:$IMAGE_TAG"

            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
              echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            fi

            docker pull "$IMAGE"

            mkdir -p /opt/day10-docker-lab
            cat > /opt/day10-docker-lab/.env <<EOF
            DATABASE_URL=$DATABASE_URL
            OPENAI_API_KEY=$OPENAI_API_KEY
            SMTP_HOST=$SMTP_HOST
            SMTP_PORT=$SMTP_PORT
            SMTP_USER=$SMTP_USER
            SMTP_PASS=$SMTP_PASS
            SMTP_FROM=$SMTP_FROM
            EOF

            docker stop day10-docker-lab || true
            docker rm day10-docker-lab || true

            docker run -d \
              --name day10-docker-lab \
              --restart unless-stopped \
              --env-file /opt/day10-docker-lab/.env \
              -p 80:3000 \
              "$IMAGE"

            docker image prune -af --filter "until=72h" || true
