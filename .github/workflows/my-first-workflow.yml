name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: .env.production
    
    services:
      postgres:
        image: postgres:16
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    # Set environment variables from GitHub Secrets or use local service for testing
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Install dependencies, run database migrations, and build the project
      - run: npm i
      - run: npx prisma migrate deploy
      - run: npm run build

      # Check database health before proceeding with the merge
      - name: Check Database Health
        run: 
          echo "Checking database connection..."
          npx prisma db execute --stdin <<< "SELECT 1 as health_check;" || exit 1
          echo "Database is healthy ✓"

      # Merge develop to main if the current branch is develop and all previous steps succeeded
      - name: Merge develop to main
        if: github.ref == 'refs/heads/develop' && success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge develop --no-edit
          git push origin main